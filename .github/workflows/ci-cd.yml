name: Validate & Deploy

on:
    push:
        branches:
            - main

jobs:
    validate-json:
        name: Validate JSON Files
        runs-on: ubuntu-latest
        steps:  
          - uses: actions/checkout@v3
          - name: Validate inventory.json
            run: python3 -m json.tool inventory.json
          - name: Validate services.json
            run: python3 -m json.tool services.json 

    deploy:
        name: Deploy to Github Pages
        runs-on: ubuntu-latest
        needs: validate-json
        steps:
          - uses: actions/checkout@v3
          - name: Deploy to Github Pages
            uses: peaceiris/actions-gh-pages@v6
            with:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: .
                publish_branch: gh-pages
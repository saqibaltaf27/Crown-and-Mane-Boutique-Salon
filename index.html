<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown & Mane Boutique Salon</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <header>
        <h1>Crown & Mane Boutique Salon</h1>
        <p>Luxury natural hair care and artisanal coloring</p>
    </header>

    <!-- Services Section -->
    <section id="services">
        <h2>Our Services</h2>
        <div id="services-container" class="card-container"></div>
    </section>

    <!-- Products Section -->
    <section id="products">
        <h2>Available Products</h2>
        <div id="product-container" class="card-container"></div>
    </section>

    <footer>
        <p>&copy; 2026 Crown & Mane Boutique Salon</p>
    </footer>

    <script>
        async function loadJSON(file) {
            try {
                const response = await fetch(file);

                if(!response.ok) throw new Error("Network Error.");
                return await response.json();
            } catch (err) {
                console.error(`Failed to load ${file}: `, err);
                return [];
            }
            
        }

        function createCard(item) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${item.name}</h3>
            <p>$${item.price}</p>`;
            return div;
        }

        async function renderContent() {
            const services = await loadJSON('services.json');
            const products = await loadJSON('inventory.json');

            const servicesContainer = document.getElementById('services-container');
            const productContainer = document.getElementById('product-container');

            if(services.length) services.forEach(s => servicesContainer.appendChild(createCard(s)));

            else productContainer.innerHTML = '<p>No products available at the moment.</p>';
        }

        renderContent();

    </script>

</body>
</html>
